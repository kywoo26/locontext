name: PR Governance

on:
  pull_request:
    types:
      - opened
      - edited
      - reopened
      - synchronize
      - ready_for_review

permissions:
  contents: read

jobs:
  validate:
    name: Validate
    runs-on: ubuntu-latest
    steps:
      - name: Checkout base branch
        uses: actions/checkout@v5
        with:
          ref: ${{ github.event.pull_request.base.sha }}
          persist-credentials: false

      - name: Set up uv with Python 3.13
        uses: astral-sh/setup-uv@cec208311dfd045dd5311c1add060b2062131d57 # v8.0.0
        with:
          python-version: "3.13"
          enable-cache: true
          cache-dependency-glob: "uv.lock"
          save-cache: false

      - name: Install dependencies
        run: uv sync --group dev --locked

      - name: Validate PR governance
        env:
          PR_TITLE: ${{ github.event.pull_request.title }}
          PR_BODY: ${{ github.event.pull_request.body }}
        run: |
          body_file="$(mktemp)"
          printf '%s' "$PR_BODY" > "$body_file"
          uv run python scripts/check_pr_governance.py --title "$PR_TITLE" --body-file "$body_file"
