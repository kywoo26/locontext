name: Verify

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  quality:
    name: Quality
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Set up uv with Python 3.13
        uses: astral-sh/setup-uv@v8
        with:
          python-version: "3.13"
          enable-cache: true
          cache-dependency-glob: "uv.lock"

      - name: Install dependencies
        run: uv sync --group dev --locked

      - name: Ruff check
        run: uv run ruff check src/locontext tests

      - name: Ruff format check
        run: uv run ruff format --check src/locontext tests

      - name: Type check
        run: uv run ty check

  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Set up uv with Python 3.13
        uses: astral-sh/setup-uv@v8
        with:
          python-version: "3.13"
          enable-cache: true
          cache-dependency-glob: "uv.lock"

      - name: Install dependencies
        run: uv sync --group dev --locked

      - name: Run unit tests
        run: uv run pytest

  build-smoke:
    name: Build Smoke
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Set up uv with Python 3.13
        uses: astral-sh/setup-uv@v8
        with:
          python-version: "3.13"
          enable-cache: true
          cache-dependency-glob: "uv.lock"

      - name: Install dependencies
        run: uv sync --group dev --locked

      - name: Compile source tree
        run: uv run python -m compileall src tests

      - name: Check CLI help
        run: uv run locontext --help
